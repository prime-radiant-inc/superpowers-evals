name: antigravity
binary: agy
agent_config_env: ANTIGRAVITY_CONFIG_DIR
session_log_dir: "${ANTIGRAVITY_CONFIG_DIR}/.gemini/antigravity-cli/brain"
session_log_glob: "**/transcript.jsonl"
normalizer: antigravity
required_env:
  - SUPERPOWERS_ROOT
max_time: 10m
# agy's Gemini Code Assist backend 429s (RESOURCE_EXHAUSTED) on concurrent
# calls and a burst trips a multi-hour rate window. Run agy strictly serial
# regardless of run-all --jobs.
max_concurrency: 1
# Even serial back-to-back starts read as a burst from the Code Assist backend's
# view, so space agy launches at least this many seconds apart, start-to-start.
# 30s is the PRI-2203 starting value; tune from experience.
launch_spacing_seconds: 30
