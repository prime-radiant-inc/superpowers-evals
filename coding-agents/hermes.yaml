name: hermes
binary: hermes
# Hermes keeps everything under ~/.hermes (config.yaml, .env, plugins/,
# logs/); HERMES_HOME can override but quorum's $HOME pinning makes the
# default land inside the throwaway run home.
home_config_subdir: ".hermes"
# Verified live (Task 5 container probe): hermes sessions are NOT files — they
# live in a SQLite store at ~/.hermes/state.db (~/.hermes/sessions/ is never
# created). The runner exports each new session post-run via
# src/agents/hermes-capture.ts (`hermes sessions list` + `hermes sessions
# export --format jsonl --session-id <id> -`) into this dir, one JSON object
# per session, matching the format src/normalize/hermes.ts parses (Harbor pin
# v0.14.0, plus our session-level token/cost metrics on top).
session_log_dir: "${QUORUM_AGENT_HOME}/.hermes/sessions-export"
session_log_glob: "*.json"
normalizer: hermes
required_env:
  - SUPERPOWERS_ROOT
max_time: 10m
# Mechanism/skill-compliance target: GLM 5.2 via OpenRouter, same credential as
# pi/opencode (spec decision 2). Alternatives via --credential.
default_credential: openrouter_glm_5_2
